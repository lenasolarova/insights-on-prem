---
# ServiceAccount for upgrades services to access Thanos
apiVersion: v1
kind: ServiceAccount
metadata:
  name: upgrades-sa
  namespace: edp-processing

---
# ClusterRoleBinding to grant cluster-monitoring-view access to upgrades-sa
# This allows the upgrades service to query Thanos Querier on port 9091
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: upgrades-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: upgrades-sa
    namespace: edp-processing
