# deploy/serviceaccount.yml — ServiceAccount and ClusterRoleBinding for the application
# ========================================================================================
# This file defines two Kubernetes resources separated by `---` (YAML document separator):
#   1. A ServiceAccount — the identity that the application pod runs as
#   2. A ClusterRoleBinding — grants that identity cluster-wide read permissions
#
# WHY this is needed:
# The application needs to query the Thanos rbac-query-proxy, which is an in-cluster
# HTTP endpoint secured by Kubernetes service account authentication. The pod uses
# its ServiceAccount's auto-mounted bearer token to authenticate to this endpoint.
# The cluster-reader role gives the ServiceAccount permission to read cluster-level
# resources, which is what the rbac-query-proxy checks before allowing metric queries.

# --- Resource 1: ServiceAccount ---

# apiVersion: v1 is the core Kubernetes API — no prefix needed for core resources like
# ServiceAccount, Pod, Service, ConfigMap, etc.
apiVersion: v1

# kind: ServiceAccount creates a Kubernetes identity for pods.
# Kubernetes automatically creates a bearer token for each ServiceAccount and mounts
# it inside pods that reference it (at /var/run/secrets/kubernetes.io/serviceaccount/token).
kind: ServiceAccount

metadata:
  # name: the name of the ServiceAccount.
  # Referenced in deploy/insights.yml under `spec.serviceAccountName: insights-on-prem`.
  name: insights-on-prem
  # namespace: which namespace this ServiceAccount belongs to.
  # The Deployment and this ServiceAccount must be in the same namespace.
  namespace: insights-on-prem-poc

# `---` is the YAML document separator — it allows multiple Kubernetes resources
# to be defined in a single file and applied together with `oc apply -f serviceaccount.yml`
---

# --- Resource 2: ClusterRoleBinding ---

# apiVersion: rbac.authorization.k8s.io/v1 is the RBAC (Role-Based Access Control) API.
# RBAC resources control who can do what within the Kubernetes cluster.
apiVersion: rbac.authorization.k8s.io/v1

# ClusterRoleBinding: binds a ClusterRole (set of permissions) to one or more subjects
# (users, groups, or service accounts) at the cluster level (not namespace-scoped).
kind: ClusterRoleBinding

metadata:
  # name: unique name for this binding within the cluster
  name: insights-on-prem-cluster-reader

# roleRef: which ClusterRole to grant to the subjects below
roleRef:
  # apiGroup: the API group that owns the ClusterRole resource
  apiGroup: rbac.authorization.k8s.io
  # kind: we're referencing a ClusterRole (cluster-wide permissions, not namespace-scoped Role)
  kind: ClusterRole
  # name: "cluster-reader" is a built-in OpenShift ClusterRole that allows read-only
  # access to most cluster-level resources (nodes, namespaces, operators, metrics, etc.).
  # This is what gives the pod permission to query Thanos via the rbac-query-proxy.
  name: cluster-reader

# subjects: the list of identities that receive the permissions from the ClusterRole above
subjects:
  - # kind: ServiceAccount means we're granting to a service account (not a user or group)
    kind: ServiceAccount
    # name: the name of the ServiceAccount defined above in this file
    name: insights-on-prem
    # namespace: which namespace the ServiceAccount lives in.
    # Required for ServiceAccount subjects in ClusterRoleBindings so Kubernetes knows
    # which specific service account to authorize (the same name can exist in multiple namespaces).
    namespace: insights-on-prem-poc
