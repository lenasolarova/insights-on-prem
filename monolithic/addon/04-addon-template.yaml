# AddOnTemplate that deploys the on-prem service via ManifestWork.
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: insights-on-prem
spec:
  addonName: insights-on-prem
  agentSpec:
    # CreateOnly: create the Deployment once, never overwrite external changes (e.g. env vars set by test_ui.sh).
    manifestConfigs:
      - resourceIdentifier:
          group: apps
          resource: deployments
          namespace: insights-on-prem-poc
          name: insights-on-prem
        updateStrategy:
          type: CreateOnly
    workload:
      manifests:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: insights-on-prem-poc

        - apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: insights-on-prem
            namespace: insights-on-prem-poc

        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: insights-on-prem-metrics-reader
          rules:
            - apiGroups: [""]
              resources: ["namespaces"]
              verbs: ["get", "list"]
            - nonResourceURLs: ["/metrics"]
              verbs: ["get"]

        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: insights-on-prem-metrics-reader
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: insights-on-prem-metrics-reader
          subjects:
            - kind: ServiceAccount
              name: insights-on-prem
              namespace: insights-on-prem-poc

        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: insights-on-prem
            namespace: insights-on-prem-poc
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: insights-on-prem
            template:
              metadata:
                labels:
                  app: insights-on-prem
              spec:
                serviceAccountName: insights-on-prem
                containers:
                  - name: insights-on-prem
                    image: quay.io/ccxdev/insights-on-premise-poc:latest
                    ports:
                      - containerPort: 8000
                        name: http
                        protocol: TCP
                    env:
                      - name: POSTGRES_HOST
                        value: "search-postgres.open-cluster-management.svc.cluster.local"
                      - name: POSTGRES_PORT
                        value: "5432"
                      - name: POSTGRES_USER
                        valueFrom:
                          secretKeyRef:
                            name: search-postgres
                            key: database-user
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: search-postgres
                            key: database-password
                      - name: POSTGRES_DB
                        valueFrom:
                          secretKeyRef:
                            name: search-postgres
                            key: database-name
                imagePullSecrets:
                  - name: ccxdev-insights-on-prem-poc-pull-secret

        - apiVersion: v1
          kind: Service
          metadata:
            name: insights-on-prem
            namespace: insights-on-prem-poc
          spec:
            selector:
              app: insights-on-prem
            ports:
              - name: http
                port: 8000
                targetPort: 8000

        - apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: insights-on-prem
            namespace: insights-on-prem-poc
          spec:
            to:
              kind: Service
              name: insights-on-prem
            port:
              targetPort: http
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect

        # Redirect insights-operator uploads and downloads to the on-prem service.
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: insights-config
            namespace: openshift-insights
          data:
            config.yaml: |
              dataReporting:
                uploadEndpoint: http://insights-on-prem.insights-on-prem-poc.svc.cluster.local:8000/api/ingress/v1/upload
                downloadEndpoint: http://insights-on-prem.insights-on-prem-poc.svc.cluster.local:8000/api/v2/cluster/%s/reports
                interval: 0h1m0s
