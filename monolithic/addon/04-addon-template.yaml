# AddOnTemplate that deploys the on-prem service via ManifestWork.
# All dynamic lookups (search-postgres secret, route domain) are handled
# at runtime by the configure Job, not at apply time via hub templates.
# This avoids silent manifest drops when referenced resources don't exist yet.
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: insights-on-prem
spec:
  addonName: insights-on-prem
  agentSpec:
    workload:
      manifests:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: insights-on-prem-poc

        # Pull secret must be created as a prerequisite before applying the addon:
        #   oc apply -f deploy/ccxdev-insights-on-prem-poc-secret.yml -n insights-on-prem-poc
        # Credentials are NOT embedded here to avoid exposing them in version control.

        - apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: insights-on-prem
            namespace: insights-on-prem-poc

        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: insights-on-prem-metrics-reader
          rules:
            - apiGroups: [""]
              resources: ["namespaces"]
              verbs: ["get", "list"]
            - nonResourceURLs: ["/metrics"]
              verbs: ["get"]

        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: insights-on-prem-metrics-reader
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: insights-on-prem-metrics-reader
          subjects:
            - kind: ServiceAccount
              name: insights-on-prem
              namespace: insights-on-prem-poc

        # Allows the configure Job to copy secrets, patch ACM deployments and create routes.
        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: insights-on-prem-configurator
          rules:
            - apiGroups: [""]
              resources: ["secrets"]
              verbs: ["get", "create", "update", "patch", "apply"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "watch", "patch", "update"]
            - apiGroups: ["route.openshift.io"]
              resources: ["routes"]
              verbs: ["get", "create", "update", "patch"]
            - apiGroups: ["config.openshift.io"]
              resources: ["ingresses"]
              verbs: ["get"]
            - apiGroups: ["operator.open-cluster-management.io"]
              resources: ["multiclusterhubs"]
              verbs: ["get", "patch", "update", "annotate"]

        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: insights-on-prem-configurator
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: insights-on-prem-configurator
          subjects:
            - kind: ServiceAccount
              name: insights-on-prem
              namespace: insights-on-prem-poc

        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: insights-on-prem
            namespace: insights-on-prem-poc
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: insights-on-prem
            template:
              metadata:
                labels:
                  app: insights-on-prem
              spec:
                serviceAccountName: insights-on-prem
                containers:
                  - name: insights-on-prem
                    image: quay.io/ccxdev/insights-on-premise-poc:latest
                    ports:
                      - containerPort: 8000
                        name: http
                        protocol: TCP
                    env:
                      - name: POSTGRES_HOST
                        value: "search-postgres.open-cluster-management.svc.cluster.local"
                      - name: POSTGRES_PORT
                        value: "5432"
                      - name: POSTGRES_USER
                        valueFrom:
                          secretKeyRef:
                            name: search-postgres
                            key: database-user
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: search-postgres
                            key: database-password
                      - name: POSTGRES_DB
                        valueFrom:
                          secretKeyRef:
                            name: search-postgres
                            key: database-name
                imagePullSecrets:
                  - name: ccxdev-insights-on-prem-poc-pull-secret

        - apiVersion: v1
          kind: Service
          metadata:
            name: insights-on-prem
            namespace: insights-on-prem-poc
          spec:
            selector:
              app: insights-on-prem
            ports:
              - name: http
                port: 8000
                targetPort: 8000

        # Redirect insights-operator uploads and downloads to the on-prem service.
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: insights-config
            namespace: openshift-insights
          data:
            config.yaml: |
              dataReporting:
                uploadEndpoint: http://insights-on-prem.insights-on-prem-poc.svc.cluster.local:8000/api/ingress/v1/upload
                downloadEndpoint: http://insights-on-prem.insights-on-prem-poc.svc.cluster.local:8000/api/v2/cluster/%s/reports
                interval: 0h1m0s

        # NOTE: Job must come LAST so all RBAC is applied before it runs.
        # Job that handles all runtime configuration:
        # - copies search-postgres secret from open-cluster-management
        # - creates the HTTPS route using the cluster's runtime apps domain
        # - sets CCX_SERVER on insights-client
        # - restarts insights-operator to pick up the new ConfigMap
        # Runs after all static manifests are applied. Idempotent.
        - apiVersion: batch/v1
          kind: Job
          metadata:
            name: insights-on-prem-configure
            namespace: insights-on-prem-poc
          spec:
            template:
              spec:
                serviceAccountName: insights-on-prem
                restartPolicy: OnFailure
                containers:
                  - name: configure
                    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
                    command:
                      - /bin/bash
                      - -c
                      - |
                        set -e

                        echo "Waiting for RBAC to be ready..."
                        until oc auth can-i create routes -n insights-on-prem-poc 2>/dev/null; do
                          echo "  waiting for route create permission..."
                          sleep 5
                        done

                        # Detect the actual klusterlet cluster name.
                        # On clusters that are both a hub AND a spoke of another hub,
                        # the klusterlet may be registered with a different name than "local-cluster".
                        KLUSTERLET_NS=$(oc get klusterlet klusterlet -o jsonpath='{.spec.clusterName}' 2>/dev/null || echo "local-cluster")
                        echo "Klusterlet cluster namespace: ${KLUSTERLET_NS}"
                        if [ "${KLUSTERLET_NS}" != "local-cluster" ]; then
                          echo "WARNING: klusterlet (${KLUSTERLET_NS}) != local-cluster. ManifestWork targets local-cluster but agent watches ${KLUSTERLET_NS}. Job-based config below will still apply correctly."
                        fi

                        echo "Copying search-postgres secret..."
                        oc get secret search-postgres -n open-cluster-management -o json | \
                          python3 -c "import sys,json; d=json.load(sys.stdin); d['metadata']={'name':'search-postgres','namespace':'insights-on-prem-poc'}; print(json.dumps(d))" | \
                          oc apply -f -

                        echo "Creating HTTPS route..."
                        oc create route edge insights-on-prem \
                          --service=insights-on-prem \
                          --port=8000 \
                          --insecure-policy=Redirect \
                          -n insights-on-prem-poc 2>/dev/null || true
                        ROUTE_HOST=$(oc get route insights-on-prem -n insights-on-prem-poc -o jsonpath='{.spec.host}')

                        echo "Pausing MCH to prevent CCX_SERVER revert..."
                        oc annotate multiclusterhub multiclusterhub \
                          -n open-cluster-management mch-pause=true --overwrite

                        echo "Setting CCX_SERVER on insights-client..."
                        oc set env deployment/insights-client -n open-cluster-management \
                          CCX_SERVER=http://insights-on-prem.insights-on-prem-poc.svc.cluster.local:8000/api/v2 \
                          POLL_INTERVAL=1

                        echo "Configuring console for URP..."
                        oc get secret ccxdev-insights-on-prem-poc-pull-secret -n insights-on-prem-poc -o json | \
                          python3 -c "import sys,json; d=json.load(sys.stdin); d['metadata']={'name':'ccxdev-insights-on-prem-poc-pull-secret','namespace':'open-cluster-management'}; print(json.dumps(d))" | \
                          oc apply -f -
                        oc set image deployment/console-chart-console-v2 -n open-cluster-management \
                          console=quay.io/ccxdev/insights-on-prem-lsolarov-console:latest
                        oc patch deployment console-chart-console-v2 -n open-cluster-management --type=strategic \
                          -p='{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ccxdev-insights-on-prem-poc-pull-secret"}],"containers":[{"name":"console","imagePullPolicy":"Always"}]}}}}'
                        oc set env deployment/console-chart-console-v2 -n open-cluster-management \
                          UPGRADE_RISKS_PREDICTION_URL=https://${ROUTE_HOST}/api/insights-results-aggregator/v2/upgrade-risks-prediction

                        echo "Restarting insights-operator..."
                        oc rollout restart deployment/insights-operator -n openshift-insights

                        echo "Waiting for on-prem pod to be ready..."
                        oc rollout status deployment/insights-on-prem -n insights-on-prem-poc --timeout=120s || true

                        echo "Done. Route: https://${ROUTE_HOST}"
