apiVersion: v1
kind: ConfigMap
metadata:
  name: insights-config
  namespace: openshift-insights
data:
  config.yaml: |
    dataReporting:
      uploadEndpoint: http://insights-on-prem.insights-on-prem-poc.svc.cluster.local:8000/api/ingress/v1/upload
      downloadEndpoint: http://insights-on-prem.insights-on-prem-poc.svc.cluster.local:8000/api/v2/cluster/%s/reports
      interval: 0h1m0s
