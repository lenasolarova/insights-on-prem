# ValidatingWebhookConfiguration that triggers the webhook_timeout_is_larger_than_default (13 seconds)
# insights-core rule, causing a cluster recommendation to appear in the ACM fleet view.
#
# This approach works on all cluster types including ROSA (unlike MachineConfigPool-based
# triggers which only work on OCP clusters with MCP).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: insights-test-webhook
webhooks:
  - name: insights-test.example.com
    admissionReviewVersions: ["v1"]
    clientConfig:
      url: "https://localhost:1234/validate"
    failurePolicy: Ignore
    sideEffects: None
    timeoutSeconds: 30
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "*"
