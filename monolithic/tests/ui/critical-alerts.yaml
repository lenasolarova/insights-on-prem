# PrometheusRule that fires two always-on critical alerts for URP testing.
#
# Two critical alerts in an openshift-* namespace are required because
# upgrade_prediction_service.py filters to >= 2 critical alerts before flagging
# a cluster as at risk. The unique alert names (InsightsTestCriticalAlert*) are
# also used by test_ui.sh to verify data is coming from local Thanos and not
# console.redhat.com.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: insights-test-alerts
  namespace: openshift-monitoring
  labels:
    openshift.io/prometheus-rule-evaluation-scope: leaf-prometheus
spec:
  groups:
  - name: insights-test
    rules:
    - alert: InsightsTestCriticalAlertOne
      expr: vector(1)
      for: 0m
      labels:
        severity: critical
        namespace: openshift-monitoring
    - alert: InsightsTestCriticalAlertTwo
      expr: vector(1)
      for: 0m
      labels:
        severity: critical
        namespace: openshift-monitoring
